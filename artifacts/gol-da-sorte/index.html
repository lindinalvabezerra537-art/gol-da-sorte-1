    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Open Graph / WhatsApp -->

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Bloqueia cliques no emblema "Made with Replit" e move para canto superior esquerdo */
      #replit-badge, .replit-badge, [id*="replit"], iframe[src*="replit.com/badge"],
      iframe[src*="replit"], div[style*="z-index: 9999"] iframe {
        pointer-events: none !important;
      }
      #replit-badge, .replit-badge, [id*="replit-badge"], [class*="replit-badge"] {
        position: fixed !important;
        top: 4px !important;
        left: 4px !important;
        bottom: auto !important;
        right: auto !important;
        z-index: 9999 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var removed = new WeakSet();
        function zapBadge() {
          var selectors = ['#replit-badge','.replit-badge','[id*="replit-badge"]','[class*="replit-badge"]','[class*="replit-ui"]'];
          selectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) {
              if (!removed.has(el) && el.parentNode) {
                el.parentNode.removeChild(el);
                removed.add(el);
              }
            });
          });
          document.querySelectorAll('iframe').forEach(function(el) {
            var src = el.src || '';
            if (src.indexOf('replit') !== -1 && src.indexOf('badge') !== -1) {
              var target = el.parentElement && el.parentElement !== document.body ? el.parentElement : el;
              if (!removed.has(target) && target.parentNode) {
                target.parentNode.removeChild(target);
                removed.add(target);
              }
            }
          });
        }
        zapBadge();
        var observer = new MutationObserver(zapBadge);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
